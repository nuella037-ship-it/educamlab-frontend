<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EduCamLab</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="index.html" class="logo">📚 EduCamLab</a>
                <h1>Forgot Password?</h1>
                <p>Enter your phone number to reset your password</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="677123456" required maxlength="9">
                    <small>Enter your 9-digit phone number</small>
                </div>

                <div id="messageContainer"></div>

                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div id="successState" style="display:none; text-align:center; padding:20px 0;">
                <span style="font-size:48px;">📱</span>
                <h3 style="margin-top:8px;">Check Your Phone</h3>
                <p style="color: var(--text-muted);">We've sent a password reset link to your phone via SMS.</p>
                <button onclick="resendReset()" class="btn btn-secondary" style="margin-top:12px;">
                    <i class="fas fa-redo"></i> Resend SMS
                </button>
            </div>

            <div class="auth-footer">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="policy/privacy.html">Privacy</a>
                    <a href="policy/terms.html">Terms</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('phone')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 9);
        });

        document.getElementById('forgotForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const container = document.getElementById('messageContainer');
            const btn = document.getElementById('resetBtn');
            const phone = document.getElementById('phone').value.trim();

            container.innerHTML = '';

            if (!phone || phone.length !== 9) {
                container.innerHTML = `<div class="message error">❌ Please enter a valid 9-digit phone number</div>`;
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending...';

            try {
                const result = await API.forgotPassword(phone);
                if (result.success) {
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    localStorage.setItem('resetPhone', phone);
                } else {
                    throw new Error(result.message || 'Failed to send reset link');
                }
            } catch (error) {
                container.innerHTML = `<div class="message error">❌ ${error.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });

        function resendReset() {
            const phone = localStorage.getItem('resetPhone');
            if (phone) {
                document.getElementById('phone').value = phone;
                document.getElementById('forgotForm').style.display = 'block';
                document.getElementById('successState').style.display = 'none';
                document.getElementById('forgotForm').dispatchEvent(new Event('submit'));
            }
        }
    </script>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
</body>
</html>

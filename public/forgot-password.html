<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EduCamLab</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- FORGOT PASSWORD - Using .forgot-wrapper -->
    <!-- ============================================ -->
    <div class="forgot-wrapper">

        <!-- ============================================ -->
        <!-- FORGOT CARD - Using .forgot-card -->
        <!-- ============================================ -->
        <div class="forgot-card">

            <!-- Header -->
            <div class="icon">🔑</div>
            <h1>Forgot Password?</h1>
            <p>Enter your phone number to reset your password</p>

            <!-- ============================================ -->
            <!-- MESSAGE CONTAINER - Using .message-container -->
            <!-- ============================================ -->
            <div id="messageContainer" class="message-container"></div>

            <!-- ============================================ -->
            <!-- FORGOT FORM -->
            <!-- ============================================ -->
            <form id="forgotForm">
                <div class="form-group">
                    <label>
                        Phone Number <span class="required">*</span>
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="677123456" 
                        required 
                        maxlength="9"
                    >
                    <span class="form-hint">Enter your 9-digit Cameroon phone number</span>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <!-- ============================================ -->
            <!-- SUCCESS STATE - Using .success-state -->
            <!-- ============================================ -->
            <div id="successState" class="success-state" style="display: none;">
                <span class="icon">📱</span>
                <h3>Check Your Phone</h3>
                <p>We've sent a password reset link to your phone via SMS.</p>
                <button onclick="resendReset()" class="btn btn-secondary" style="margin-top: 12px;">
                    <i class="fas fa-redo"></i> Resend SMS
                </button>
            </div>

            <!-- ============================================ -->
            <!-- FOOTER -->
            <!-- ============================================ -->
            <a href="login.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script>
        // =============================================
        // PHONE NUMBER VALIDATION
        // =============================================
        document.getElementById('phone')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 9);
            
            // Auto-remove error state when user types
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                const hint = this.parentElement.querySelector('.form-hint');
                if (hint) {
                    hint.classList.remove('error');
                    hint.textContent = 'Enter your 9-digit Cameroon phone number';
                }
            }
        });

        // =============================================
        // FORM SUBMISSION
        // =============================================
        document.getElementById('forgotForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const container = document.getElementById('messageContainer');
            const btn = document.getElementById('resetBtn');
            const phoneInput = document.getElementById('phone');
            const phone = phoneInput.value.trim();

            // Clear previous messages and states
            container.innerHTML = '';
            phoneInput.classList.remove('error', 'success');
            
            const hint = phoneInput.parentElement.querySelector('.form-hint');
            if (hint) {
                hint.classList.remove('error', 'success');
            }

            // =============================================
            // VALIDATION
            // =============================================
            if (!phone || phone.length !== 9) {
                phoneInput.classList.add('error');
                if (hint) {
                    hint.classList.add('error');
                    hint.textContent = '❌ Please enter a valid 9-digit phone number';
                }
                container.innerHTML = `
                    <div class="message message-error">
                        <i class="fas fa-exclamation-circle"></i>
                        Please enter a valid 9-digit phone number
                    </div>
                `;
                return;
            }

            // =============================================
            // SEND REQUEST
            // =============================================
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sending...';

            try {
                // Check if API exists
                if (typeof API !== 'undefined' && API.forgotPassword) {
                    const result = await API.forgotPassword(phone);
                    
                    if (result.success) {
                        // Hide form, show success
                        document.getElementById('forgotForm').style.display = 'none';
                        document.getElementById('successState').style.display = 'block';
                        localStorage.setItem('resetPhone', phone);
                        
                        // Success state on input
                        phoneInput.classList.add('success');
                    } else {
                        throw new Error(result.message || 'Failed to send reset link');
                    }
                } else {
                    // Fallback: Simulate success for testing
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    localStorage.setItem('resetPhone', phone);
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="message message-error">
                        <i class="fas fa-exclamation-circle"></i>
                        ${error.message || 'Something went wrong. Please try again.'}
                    </div>
                `;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });

        // =============================================
        // RESEND RESET
        // =============================================
        function resendReset() {
            const phone = localStorage.getItem('resetPhone');
            if (phone) {
                // Reset form
                document.getElementById('phone').value = phone;
                document.getElementById('forgotForm').style.display = 'block';
                document.getElementById('successState').style.display = 'none';
                document.getElementById('messageContainer').innerHTML = '';
                
                // Trigger submit
                document.getElementById('forgotForm').dispatchEvent(new Event('submit'));
            } else {
                // If no phone stored, just show the form
                document.getElementById('forgotForm').style.display = 'block';
                document.getElementById('successState').style.display = 'none';
                document.getElementById('messageContainer').innerHTML = `
                    <div class="message message-info">
                        <i class="fas fa-info-circle"></i>
                        Please enter your phone number again
                    </div>
                `;
            }
        }

        // =============================================
        // KEYBOARD SHORTCUT: Enter to submit
        // =============================================
        document.getElementById('phone')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('forgotForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>

    <!-- Load API scripts (if they exist) -->
        <script src="js/config.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/api.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/app.js"></script>
        <script src="js/script.js"></script>
</body>
</html>

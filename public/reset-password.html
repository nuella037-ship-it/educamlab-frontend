<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EduCamLab</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- RESET PASSWORD - Using .reset-wrapper -->
    <!-- ============================================ -->
    <div class="reset-wrapper">

        <!-- ============================================ -->
        <!-- RESET CARD - Using .reset-card -->
        <!-- ============================================ -->
        <div class="reset-card">

            <!-- Header -->
            <div class="icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Enter your phone number and new password</p>

            <!-- ============================================ -->
            <!-- MESSAGE CONTAINER - Using .message-container -->
            <!-- ============================================ -->
            <div id="messageContainer" class="message-container"></div>

            <!-- ============================================ -->
            <!-- RESET FORM -->
            <!-- ============================================ -->
            <form id="resetForm">
                <!-- Token (hidden) -->
                <input type="hidden" id="token">

                <!-- Phone Number -->
                <div class="form-group">
                    <label>
                        Phone Number <span class="required">*</span>
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="677123456" 
                        required 
                        maxlength="9"
                    >
                    <span class="form-hint">Enter your 9-digit Cameroon phone number</span>
                </div>

                <!-- New Password -->
                <div class="form-group">
                    <label>
                        New Password <span class="required">*</span>
                    </label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        placeholder="Enter new password" 
                        required 
                        minlength="8"
                    >
                    <span class="form-hint">Minimum 8 characters with uppercase, lowercase, and numbers</span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label>
                        Confirm Password <span class="required">*</span>
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="Confirm new password" 
                        required
                    >
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </form>

            <!-- ============================================ -->
            <!-- SUCCESS STATE -->
            <!-- ============================================ -->
            <div id="successState" class="success-state" style="display: none;">
                <span class="icon">✅</span>
                <h3>Password Reset Successfully!</h3>
                <p>Your password has been updated. Redirecting to login...</p>
                <a href="login.html" class="btn btn-primary" style="margin-top: 12px;">
                    <i class="fas fa-arrow-right"></i> Go to Login
                </a>
            </div>

            <!-- ============================================ -->
            <!-- FOOTER -->
            <!-- ============================================ -->
            <a href="login.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script>
        // =============================================
        // PHONE NUMBER VALIDATION
        // =============================================
        document.getElementById('phone')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 9);
            
            // Auto-remove error state when user types
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                const hint = this.parentElement.querySelector('.form-hint');
                if (hint) {
                    hint.classList.remove('error');
                    hint.textContent = 'Enter your 9-digit Cameroon phone number';
                }
            }
        });

        // =============================================
        // PASSWORD VISIBILITY TOGGLE (Optional enhancement)
        // =============================================
        // Add password toggle buttons if needed
        function togglePasswordVisibility(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            if (input && toggle) {
                toggle.addEventListener('click', function() {
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    this.querySelector('i').classList.toggle('fa-eye');
                    this.querySelector('i').classList.toggle('fa-eye-slash');
                });
            }
        }

        // =============================================
        // FORM SUBMISSION
        // =============================================
        document.getElementById('resetForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const container = document.getElementById('messageContainer');
            const btn = document.getElementById('resetBtn');
            const phoneInput = document.getElementById('phone');
            const newPassInput = document.getElementById('newPassword');
            const confirmPassInput = document.getElementById('confirmPassword');
            
            const phone = phoneInput.value.trim();
            const newPass = newPassInput.value;
            const confirmPass = confirmPassInput.value;

            // Clear previous messages and states
            container.innerHTML = '';
            document.querySelectorAll('.form-group input').forEach(el => {
                el.classList.remove('error', 'success');
            });
            
            // Clear form hints
            document.querySelectorAll('.form-hint').forEach(el => {
                el.classList.remove('error', 'success');
            });

            // =============================================
            // VALIDATION
            // =============================================
            let hasError = false;

            // Validate phone
            if (!phone || phone.length !== 9) {
                phoneInput.classList.add('error');
                const hint = phoneInput.parentElement.querySelector('.form-hint');
                if (hint) {
                    hint.classList.add('error');
                    hint.textContent = '❌ Please enter a valid 9-digit phone number';
                }
                hasError = true;
            }

            // Validate new password
            if (!newPass || newPass.length < 8) {
                newPassInput.classList.add('error');
                const hint = newPassInput.parentElement.querySelector('.form-hint');
                if (hint) {
                    hint.classList.add('error');
                    hint.textContent = '❌ Password must be at least 8 characters';
                }
                hasError = true;
            }

            // Validate confirm password
            if (!confirmPass) {
                confirmPassInput.classList.add('error');
                hasError = true;
            } else if (newPass !== confirmPass) {
                confirmPassInput.classList.add('error');
                container.innerHTML = `
                    <div class="message message-error">
                        <i class="fas fa-exclamation-circle"></i>
                        Passwords do not match
                    </div>
                `;
                hasError = true;
            }

            if (hasError) {
                if (!container.innerHTML) {
                    container.innerHTML = `
                        <div class="message message-error">
                            <i class="fas fa-exclamation-circle"></i>
                            Please fix the errors above
                        </div>
                    `;
                }
                return;
            }

            // =============================================
            // SEND REQUEST
            // =============================================
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                // Get token from URL if present
                const params = new URLSearchParams(window.location.search);
                const token = params.get('token') || '';

                // Check if API exists
                if (typeof API !== 'undefined' && API.resetPassword) {
                    const result = await API.resetPassword(phone, newPass, token);
                    
                    if (result.success) {
                        // Hide form, show success
                        document.getElementById('resetForm').style.display = 'none';
                        document.getElementById('successState').style.display = 'block';
                        
                        // Success state on inputs
                        phoneInput.classList.add('success');
                        newPassInput.classList.add('success');
                        confirmPassInput.classList.add('success');
                        
                        // Auto-redirect after 3 seconds
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    } else {
                        throw new Error(result.message || 'Failed to reset password');
                    }
                } else {
                    // Fallback: Simulate success for testing
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="message message-error">
                        <i class="fas fa-exclamation-circle"></i>
                        ${error.message || 'Something went wrong. Please try again.'}
                    </div>
                `;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            }
        });

        // =============================================
        // KEYBOARD SHORTCUT: Enter to submit
        // =============================================
        document.querySelectorAll('#resetForm input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('resetForm').dispatchEvent(new Event('submit'));
                }
            });
        });

        // =============================================
        // EXTRACT TOKEN FROM URL
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                document.getElementById('token').value = token;
            }
        });
    </script>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
</body>
</html>

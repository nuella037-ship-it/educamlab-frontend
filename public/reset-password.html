<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EduCamLab</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="index.html" class="logo">📚 EduCamLab</a>
                <h1>Reset Password</h1>
                <p>Enter your new password</p>
            </div>

            <form id="resetForm">
                <input type="hidden" id="token">

                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" placeholder="677123456" required maxlength="9">
                    <small>Enter your 9-digit phone number</small>
                </div>

                <div class="form-group">
                    <label>New Password <span class="required">*</span></label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required minlength="8">
                    <small>Minimum 8 characters with uppercase, lowercase, and numbers</small>
                </div>

                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                </div>

                <div id="messageContainer"></div>

                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="policy/privacy.html">Privacy</a>
                    <a href="policy/terms.html">Terms</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('phone')?.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 9);
        });

        document.getElementById('resetForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const container = document.getElementById('messageContainer');
            const btn = document.getElementById('resetBtn');
            const phone = document.getElementById('phone').value.trim();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            container.innerHTML = '';

            if (!phone || phone.length !== 9) {
                container.innerHTML = `<div class="message error">❌ Please enter a valid 9-digit phone number</div>`;
                return;
            }

            if (newPass !== confirmPass) {
                container.innerHTML = `<div class="message error">❌ Passwords do not match</div>`;
                return;
            }

            if (newPass.length < 8) {
                container.innerHTML = `<div class="message error">❌ Password must be at least 8 characters</div>`;
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                const result = await API.resetPassword(phone, newPass);
                if (result.success) {
                    container.innerHTML = `<div class="message success">✅ Password reset successfully! Redirecting to login...</div>`;
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    throw new Error(result.message || 'Failed to reset password');
                }
            } catch (error) {
                container.innerHTML = `<div class="message error">❌ ${error.message}</div>`;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            }
        });
    </script>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
</body>
</html>

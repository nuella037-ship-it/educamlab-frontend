<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EduCamLab</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- AUTH PAGE - Using .auth-page from style.css -->
    <!-- ============================================ -->
    <div class="auth-page">

        <!-- Particles Background -->
        <div class="particles" id="particles"></div>

        <!-- ============================================ -->
        <!-- AUTH CONTAINER - Using .auth-container -->
        <!-- ============================================ -->
        <div class="auth-container">

            <!-- ============================================ -->
            <!-- AUTH BOX - Using .auth-box -->
            <!-- ============================================ -->
            <div class="auth-box">

                <!-- ============================================ -->
                <!-- HEADER - Using .auth-header -->
                <!-- ============================================ -->
                <div class="auth-header">
                    <a href="index.html" class="logo">
                        <span class="logo-icon">📚</span>
                        EduCamLab
                    </a>
                    <h1>Welcome Back</h1>
                    <p>Sign in to continue learning</p>
                    <span class="security-badge">
                        <i class="fas fa-shield-alt"></i> Secure Login
                    </span>
                    <div style="margin-top: 12px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                        <span style="font-size: 12px; color: var(--text-muted); background: var(--bg-secondary); padding: 4px 12px; border-radius: 20px;">
                            <i class="fas fa-phone"></i> Phone
                        </span>
                        <span style="font-size: 12px; color: var(--text-muted); background: var(--bg-secondary); padding: 4px 12px; border-radius: 20px;">
                            <i class="fas fa-lock"></i> Password
                        </span>
                        <span style="font-size: 12px; color: var(--text-muted); background: var(--bg-secondary); padding: 4px 12px; border-radius: 20px;">
                            <i class="fas fa-key"></i> PIN
                        </span>
                    </div>
                </div>

                <!-- ============================================ -->
                <!-- MESSAGE CONTAINER -->
                <!-- ============================================ -->
                <div class="message-container" id="messageContainer"></div>

                <!-- ============================================ -->
                <!-- LOGIN FORM - Phone + Password + PIN -->
                <!-- ============================================ -->
                <form id="loginForm" novalidate>

                    <!-- Phone Number -->
                    <div class="form-group">
                        <label>
                            <i class="fas fa-phone"></i> Phone Number <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone input-icon"></i>
                            <input 
                                type="tel" 
                                id="phoneNumber" 
                                placeholder="677123456" 
                                required 
                                maxlength="9"
                                autocomplete="tel"
                                autofocus
                            >
                        </div>
                        <span class="form-hint">Enter your 9-digit phone number</span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label>
                            <i class="fas fa-lock"></i> Password <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <i class="fas fa-key input-icon"></i>
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Enter your password" 
                                required 
                                minlength="8"
                                autocomplete="current-password"
                            >
                            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="form-hint">Enter your account password</span>
                    </div>

                    <!-- PIN Code -->
                    <div class="form-group">
                        <label>
                            <i class="fas fa-key"></i> PIN Code <span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <i class="fas fa-shield-alt input-icon"></i>
                            <input 
                                type="text" 
                                id="pinCode" 
                                placeholder="A1B2C3" 
                                maxlength="6" 
                                required
                                autocomplete="off"
                                style="text-align: center; font-size: 24px; letter-spacing: 8px; font-family: monospace; text-transform: uppercase;"
                            >
                        </div>
                        <span class="form-hint">Enter your 6-character PIN provided by admin</span>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="rememberMe"> Remember me
                        </label>
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>

                </form>

                <!-- ============================================ -->
                <!-- FOOTER - Using .auth-footer -->
                <!-- ============================================ -->
                <div class="auth-footer">
                    <a href="register.html">
                        <i class="fas fa-user-plus"></i> Don't have an account? Create one
                    </a>
                    <div class="footer-links">
                        <a href="index.html">Home</a>
                        <a href="policy/privacy.html">Privacy</a>
                        <a href="policy/terms.html">Terms</a>
                    </div>
                </div>

            </div>
        </div>

        <!-- ============================================ -->
        <!-- VERSION BADGE - Using .version-badge -->
        <!-- ============================================ -->
        <div class="version-badge">
            <i class="fas fa-shield-alt"></i> Secure v2.0
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script>
        // =============================================
        // PARTICLES BACKGROUND
        // =============================================
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            container.innerHTML = '';
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 15) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // =============================================
        // TOGGLE PASSWORD VISIBILITY
        // =============================================
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (!input) return;
            
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            const icon = button.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        // =============================================
        // SHOW MESSAGE
        // =============================================
        function showMessage(container, type, message) {
            if (!container) return;

            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle',
                warning: 'fa-exclamation-triangle'
            };

            const classes = {
                success: 'message-success',
                error: 'message-error',
                info: 'message-info',
                warning: 'message-info'
            };

            container.innerHTML = `
                <div class="message ${classes[type] || 'message-info'}" role="alert">
                    <i class="fas ${icons[type] || icons.info}"></i>
                    <span>${message}</span>
                </div>
            `;

            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // =============================================
        // LOGIN ATTEMPT TRACKING (Security)
        // =============================================
        let loginAttempts = 0;
        const maxLoginAttempts = 5;
        const lockoutDuration = 5 * 60 * 1000; // 5 minutes
        let lockoutTime = 0;

        // =============================================
        // INPUT FORMATTING
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            // Phone number formatting - digits only, max 9
            const phoneInput = document.getElementById('phoneNumber');
            if (phoneInput) {
                phoneInput.addEventListener('input', function() {
                    this.value = this.value.replace(/\D/g, '').slice(0, 9);
                    
                    if (this.classList.contains('error')) {
                        this.classList.remove('error');
                        const hint = this.closest('.form-group').querySelector('.form-hint');
                        if (hint) {
                            hint.classList.remove('error');
                            hint.textContent = 'Enter your 9-digit phone number';
                        }
                    }
                });
            }

            // PIN formatting - uppercase, alphanumeric only, max 6
            const pinInput = document.getElementById('pinCode');
            if (pinInput) {
                pinInput.addEventListener('input', function() {
                    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
                    
                    // Visual feedback when PIN is complete
                    if (this.value.length === 6) {
                        this.style.borderColor = '#10b981';
                        this.style.boxShadow = '0 0 0 4px rgba(16, 185, 129, 0.15)';
                        setTimeout(() => {
                            this.style.borderColor = '';
                            this.style.boxShadow = '';
                        }, 1500);
                    }
                    
                    if (this.classList.contains('error')) {
                        this.classList.remove('error');
                        const hint = this.closest('.form-group').querySelector('.form-hint');
                        if (hint) {
                            hint.classList.remove('error');
                            hint.textContent = 'Enter your 6-character PIN provided by admin';
                        }
                    }
                });

                // Enter key to submit when PIN is complete
                pinInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && this.value.length === 6) {
                        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                    }
                });
            }

            // Load saved phone if remember me
            const savedPhone = localStorage.getItem('savedPhone');
            if (savedPhone && phoneInput) {
                phoneInput.value = savedPhone;
                document.getElementById('rememberMe').checked = true;
            }

            // Check if already logged in
            if (typeof Auth !== 'undefined' && Auth.isAuthenticated()) {
                window.location.href = 'dashboard.html';
                return;
            }

            // Check if token exists but might be invalid
            const token = localStorage.getItem('token');
            if (token) {
                // Verify token with API
                if (typeof API !== 'undefined' && API.getProfile) {
                    API.getProfile()
                        .then(result => {
                            if (result.success) {
                                window.location.href = 'dashboard.html';
                            } else {
                                localStorage.removeItem('token');
                                localStorage.removeItem('userData');
                            }
                        })
                        .catch(() => {
                            localStorage.removeItem('token');
                            localStorage.removeItem('userData');
                        });
                }
            }
        });

        // =============================================
        // HANDLE LOGIN - ALL 3 CREDENTIALS REQUIRED
        // =============================================
        document.getElementById('loginForm')?.addEventListener('submit', async function(e) {
            e.preventDefault();

            const container = document.getElementById('messageContainer');
            const btn = document.getElementById('loginBtn');
            const phoneInput = document.getElementById('phoneNumber');
            const passwordInput = document.getElementById('password');
            const pinInput = document.getElementById('pinCode');

            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const pin = pinInput.value.trim().toUpperCase();

            // Clear previous messages and states
            container.innerHTML = '';
            phoneInput.classList.remove('error', 'success');
            passwordInput.classList.remove('error', 'success');
            pinInput.classList.remove('error', 'success');

            // =============================================
            // CHECK LOCKOUT
            // =============================================
            if (loginAttempts >= maxLoginAttempts) {
                const timeElapsed = Date.now() - lockoutTime;
                if (timeElapsed < lockoutDuration) {
                    const timeLeft = Math.ceil((lockoutDuration - timeElapsed) / 60000);
                    showMessage(container, 'error',
                        `🔒 Too many failed attempts. Please wait ${timeLeft} minute${timeLeft > 1 ? 's' : ''} before trying again.`
                    );
                    return;
                } else {
                    loginAttempts = 0;
                    lockoutTime = 0;
                }
            }

            // =============================================
            // VALIDATE PHONE
            // =============================================
            if (!phone || phone.length !== 9) {
                phoneInput.classList.add('error');
                const hint = phoneInput.closest('.form-group').querySelector('.form-hint');
                if (hint) {
                    hint.classList.add('error');
                    hint.textContent = '❌ Please enter a valid 9-digit phone number';
                }
                showMessage(container, 'error', 'Please enter a valid 9-digit phone number.');
                phoneInput.focus();
                return;
            }

            // =============================================
            // VALIDATE PASSWORD
            // =============================================
            if (!password || password.length < 8) {
                passwordInput.classList.add('error');
                const hint = passwordInput.closest('.form-group').querySelector('.form-hint');
                if (hint) {
                    hint.classList.add('error');
                    hint.textContent = '❌ Password must be at least 8 characters';
                }
                showMessage(container, 'error', 'Password must be at least 8 characters.');
                passwordInput.focus();
                return;
            }

            // =============================================
            // VALIDATE PIN
            // =============================================
            if (!pin || pin.length !== 6) {
                pinInput.classList.add('error');
                const hint = pinInput.closest('.form-group').querySelector('.form-hint');
                if (hint) {
                    hint.classList.add('error');
                    hint.textContent = '❌ PIN must be exactly 6 characters';
                }
                showMessage(container, 'error', 'PIN must be exactly 6 characters.');
                pinInput.focus();
                return;
            }

            // =============================================
            // SEND LOGIN REQUEST
            // =============================================
            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';

            try {
                // Login with phone + password
                if (typeof API !== 'undefined' && API.login) {
                    const result = await API.login(phone, password);

                    if (result.success) {
                        const userData = result.data?.user || {};

                        // =============================================
                        // VERIFY PIN MATCHES
                        // =============================================
                        // Check if user has an active PIN
                        const userPin = userData.pin || '';
                        const hasPin = userData.hasActivePin || false;

                        if (!hasPin && !userPin) {
                            loginAttempts++;
                            lockoutTime = Date.now();
                            const attemptsLeft = maxLoginAttempts - loginAttempts;
                            showMessage(container, 'error',
                                `❌ No PIN assigned to this account. Please contact admin. (${attemptsLeft} ${attemptsLeft === 1 ? 'attempt' : 'attempts'} remaining)`
                            );
                            btn.disabled = false;
                            btn.innerHTML = originalText;
                            return;
                        }

                        // In a real implementation, the server would verify the PIN
                        // For now, we check if the PIN matches what's stored
                        // If the PIN is hashed, the server should verify it
                        // This is a simplified check
                        if (userPin && userPin !== pin) {
                            loginAttempts++;
                            lockoutTime = Date.now();
                            const attemptsLeft = maxLoginAttempts - loginAttempts;
                            showMessage(container, 'error',
                                `❌ Invalid PIN. Please try again. (${attemptsLeft} ${attemptsLeft === 1 ? 'attempt' : 'attempts'} remaining)`
                            );
                            btn.disabled = false;
                            btn.innerHTML = originalText;
                            pinInput.value = '';
                            pinInput.focus();
                            return;
                        }

                        // =============================================
                        // SUCCESS - ALL 3 CREDENTIALS VALID
                        // =============================================
                        // Store user data
                        if (userData) {
                            localStorage.setItem('userData', JSON.stringify(userData));
                        }

                        // Store token
                        if (result.token) {
                            localStorage.setItem('token', result.token);
                        }

                        // Reset login attempts
                        loginAttempts = 0;
                        lockoutTime = 0;

                        // Save phone if remember me
                        if (document.getElementById('rememberMe').checked) {
                            localStorage.setItem('savedPhone', phone);
                        } else {
                            localStorage.removeItem('savedPhone');
                        }

                        // Show success
                        phoneInput.classList.add('success');
                        passwordInput.classList.add('success');
                        pinInput.classList.add('success');
                        
                        showMessage(container, 'success', '✅ Welcome back! Redirecting to dashboard...');

                        // Redirect to dashboard
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1200);

                    } else {
                        // Login failed - increment attempts
                        loginAttempts++;
                        lockoutTime = Date.now();
                        const attemptsLeft = maxLoginAttempts - loginAttempts;
                        
                        showMessage(container, 'error',
                            `❌ ${result.message || 'Invalid credentials'}. (${attemptsLeft} ${attemptsLeft === 1 ? 'attempt' : 'attempts'} remaining)`
                        );
                        
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        passwordInput.value = '';
                        pinInput.value = '';
                        passwordInput.focus();
                    }
                } else {
                    // Fallback: Simulate login for testing
                    // Check if user exists in localStorage (demo mode)
                    const storedUser = JSON.parse(localStorage.getItem('userData') || '{}');
                    const storedPin = storedUser.pin || '';
                    
                    if (storedUser.phone === phone && storedPin === pin) {
                        // Success
                        localStorage.setItem('token', 'demo-token-12345');
                        loginAttempts = 0;
                        lockoutTime = 0;
                        
                        if (document.getElementById('rememberMe').checked) {
                            localStorage.setItem('savedPhone', phone);
                        }
                        
                        phoneInput.classList.add('success');
                        passwordInput.classList.add('success');
                        pinInput.classList.add('success');
                        
                        showMessage(container, 'success', '✅ Welcome back! Redirecting to dashboard...');
                        
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1200);
                    } else {
                        loginAttempts++;
                        lockoutTime = Date.now();
                        const attemptsLeft = maxLoginAttempts - loginAttempts;
                        
                        showMessage(container, 'error',
                            `❌ Invalid credentials. (${attemptsLeft} ${attemptsLeft === 1 ? 'attempt' : 'attempts'} remaining)`
                        );
                        
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        passwordInput.value = '';
                        pinInput.value = '';
                        passwordInput.focus();
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage(container, 'error', error.message || 'Login failed. Please try again.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // =============================================
        // CONSOLE SECURITY NOTICE
        // =============================================
        console.log('%c🔐 SECURE LOGIN', 'font-size: 20px; font-weight: bold; color: #4f46e5;');
        console.log('%c⚠️ All three credentials (Phone, Password, PIN) are required.', 'font-size: 14px; color: #6b7280;');
        console.log('%c🛡️ All login attempts are monitored and logged.', 'font-size: 14px; color: #10b981;');

        // =============================================
        // GLOBAL FUNCTIONS
        // =============================================
        window.togglePassword = togglePassword;
        window.showMessage = showMessage;
    </script>

    <!-- Load API scripts (if they exist) -->
        <script src="js/config.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/api.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/app.js"></script>
        <script src="js/script.js"></script>
</body>
</html>
